[code.multi_agent]
enabled = true
max_subagent_depth = 1
max_concurrent_subagents = 1

[code.goal]
enabled = false
auto_continue_on_resume = "ask"
max_continuation_loops = 50
require_completion_evidence = true

[code.agents.planner]
mode = "primary"
model = "anthropic/claude-3-5-sonnet-latest"
tools = ["read_file", "list_dir", "grep_files", "task"]
steps = 30

[code.agents.coder]
mode = "subagent"
model = "deepseek/deepseek-chat"
tools = ["read_file", "list_dir", "apply_patch", "run_command"]
permission = { write = "allow", shell = "ask" }
steps = 40

[code.agents.reviewer]
mode = "subagent"
model = "openai/gpt-4o-mini"
tools = ["read_file", "list_dir", "grep_files"]
permission = { write = "deny", shell = "deny" }
steps = 15

[code.compaction]
model = "deepseek/deepseek-chat"
tail_turns = 3
preserve_recent_tokens = 4000

[code.budget]
max_session_cost_usd = 5.0
warn_session_cost_usd = 2.0
max_session_tokens = 1_000_000

[code.budget.goal]
warn_cost_usd = 2.0
max_cost_usd = 5.0
warn_wall_clock_minutes = 30
max_wall_clock_minutes = 120

[code.budget.per_agent.coder]
max_cost_usd = 2.0
max_steps = 40

[code.budget.per_agent.reviewer]
max_cost_usd = 0.5
max_steps = 15
