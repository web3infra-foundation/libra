<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Libra Code 仅限本机访问</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #17181c;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(680px, 100%);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        line-height: 1.1;
      }
      p {
        margin: 0 0 18px;
        color: #4a4f5c;
        line-height: 1.6;
      }
      dl {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 10px 16px;
        margin: 24px 0 0;
        padding: 18px;
        border: 1px solid #d9dde5;
        border-radius: 8px;
        background: #ffffff;
      }
      dt {
        font-weight: 700;
      }
      dd {
        margin: 0;
        word-break: break-word;
        color: #333844;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #111318;
          color: #f1f3f7;
        }
        p {
          color: #c4c8d1;
        }
        dl {
          background: #191c22;
          border-color: #333945;
        }
        dd {
          color: #dfe3ea;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Libra Code 仅限本机访问</h1>
      <p>此浏览器正在通过非 loopback 地址访问 Libra Code。交互 API、会话数据、运行时细节、工作区路径和控制凭据只会暴露给同一台机器上的客户端。</p>
      <p>请在运行 Libra 的主机上打开界面，例如 <strong>http://127.0.0.1:&lt;port&gt;</strong> 或 <strong>http://localhost:&lt;port&gt;</strong>。</p>
      <dl>
        <dt>监听地址</dt>
        <dd>__LIBRA_BIND__</dd>
        <dt>远程地址</dt>
        <dd>__LIBRA_REMOTE__</dd>
        <dt>版本</dt>
        <dd>__LIBRA_VERSION__</dd>
        <dt>提交</dt>
        <dd>__LIBRA_COMMIT__</dd>
      </dl>
    </main>
  </body>
</html>
