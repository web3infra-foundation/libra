name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  upload-assets:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            arch: aarch64
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            arch: x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Building
        run: |
          cargo install --locked cargo-packager
          cargo build --release --manifest-path Cargo.toml

      - name: Prepare Linux
        if: contains(matrix.os, 'ubuntu')
        run: |
          mv target/release/libra ${{ github.workspace }}/libra_${{ github.ref_name }}_${{ matrix.target }}

      - name: Prepare Windows
        if: contains(matrix.os, 'windows')
        run: |
          mv target/release/libra.exe ${{ github.workspace }}/libra_${{ github.ref_name }}_${{ matrix.target }}.exe

      - name: Prepare MacOS
        if: contains(matrix.os, 'macos')
        run: |
          mv target/release/libra ${{ github.workspace }}/libra_${{ github.ref_name }}_${{ matrix.target }}

      - name: Release Linux
        if: contains(matrix.os, 'ubuntu')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          overwrite: true
          files: |
            libra_${{ github.ref_name }}_${{ matrix.target }}

      - name: Release Windows
        if: contains(matrix.os, 'windows')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          overwrite: true
          files: |
            libra_${{ github.ref_name }}_${{ matrix.target }}.exe

      - name: Release MacOS
        if: contains(matrix.os, 'macos')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          overwrite: true
          files: |
            libra_${{ github.ref_name }}_${{ matrix.target }}
