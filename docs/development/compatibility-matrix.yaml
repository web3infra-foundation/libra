# Libra Compatibility Matrix
#
# This YAML is the source of truth for parameter-level Git compatibility tracking.
# It is generated from src/cli.rs, COMPATIBILITY.md, command docs, integration-scenarios.yaml,
# and upstream Git documentation.
#
# Machine-readable state (test_evidence, last_verified, verification_command, status_source)
# must be generated by automated tools; human editors are restricted to:
#   - action, priority, phase, declined_ref
#   - notes, performance_note, compliance_note, risk_controls
#   - decision_deadline, decision_owner (for evaluate rows)
#
# All other fields are reserved for tool generation.
#
# See docs/development/compatibility.md §PRE-2 for schema definition.

schema_version: "1.0"
matrix_created: "2026-06-12"
generated_from:
  - src/cli.rs
  - COMPATIBILITY.md
  - docs/commands/
  - docs/development/integration-scenarios.yaml
  - tools/integration-runner/src/registry.rs
  - upstream Git documentation (git-scm.com/docs, git.git t/ tests)
  - docs/improvement/compatibility/declined.md
  - optional: Grit supplemental reference (unavailable in Phase 0, will be added if available)

manual_fields:
  - action
  - priority
  - phase
  - declined_ref
  - notes
  - performance_note
  - compliance_note
  - risk_controls
  - decision_deadline
  - decision_owner

tool_generated_fields:
  - status
  - test_evidence
  - verification_command
  - last_verified
  - status_source
  - expected_failure_handling
  - owner_scenario
  - tests
  - git_tests
  - grit_tests
  - compat_contract
  - source_of_truth
  - interop_surface
  - host_dependencies
  - data_flow
  - control_flow
  - risk

entries:
  # ============================================================================
  # P0 REJECTION BEHAVIORS (PRE-3 decided)
  # ============================================================================
  # These entries cover Git CLI flags that Libra explicitly rejects with stable
  # error code LBR-UNSUPPORTED-001 per the PRE-3 decision.
  # P0 tests must assert: non-zero exit + stderr template + JSON envelope + code.

  - command: add
    flag: -p / --patch
    action: reject
    priority: P0
    phase: 0
    status: done
    declined_ref: D15
    risk: low
    compat_contract: explicitly-rejected
    source_of_truth: [libra-test, compat-docs]
    owner_scenario: cli.cross-cutting-flags
    tests: tests/compat/P0_rejection_flags.rs::test_add_patch_rejected
    test_evidence: tests/compat/P0_rejection_flags.rs::test_add_patch_rejected
    verification_command: cargo test --test P0_rejection_flags test_add_patch_rejected
    last_verified: "2026-06-12"
    status_source: manual-bootstrap
    expected_failure_handling: not-applicable
    host_dependencies: none
    data_flow: CLI argv parsing only
    control_flow: clap flag parser -> error handler -> LBR-UNSUPPORTED-001 exit
    risk_controls: Early parser rejection, no state mutation
    compliance_note: Libra intentional difference; no upstream Git test porting needed
    notes: |
      Git's `add -p` / `--patch` invokes an interactive patch-selection UI.
      Libra rejects this to avoid TTY complexity and maintain agent-drivability.
      Recommended alternative: use `add <paths>` with explicit file selection or `libra code` interactive TUI.

