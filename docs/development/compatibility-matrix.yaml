    data_flow: Remote URL parsing + rejection
    control_flow: command handler early exit with hint "use fetch/clone for local-path repositories"
    risk_controls: Explicit fail-closed rejection to avoid concurrent write semantics
    compliance_note: Libra intentional difference; see src/command/push.rs:118 and declined.md D2
    notes: |
      Libra does not support push to local file remotes (file://).
      This is an intentional decision to avoid undefined concurrent write semantics.
      Recommended: use fetch/clone to interact with local filesystem repositories,
      or use network remotes (SSH, HTTPS, git://) for push operations.
      See docs/improvement/compatibility/declined.md#d2-local-file-remote-push

  # ============================================================================
  # P0 INTENTIONAL DIFFERENCES (Behavior locked / regression tests)
  # ============================================================================
  # These entries document behaviors where Libra intentionally differs from Git.
  # P0 tests verify that Libra's behavior is consistent and won't be accidentally changed.

  - command: clean
    flag: -i / --interactive
    action: intentional-diff
    priority: P0
    phase: 0
    status: done
    declined_ref: null
    risk: low
    compat_contract: intentional-difference
    source_of_truth: [libra-test, compat-docs]
    owner_scenario: cli.clean-rm-mv-lfs-basic
    tests: tests/compat/P0_intentional_differences.rs::test_clean_interactive_libra_native
    test_evidence: tests/compat/P0_intentional_differences.rs::test_clean_interactive_libra_native
    verification_command: cargo test --test P0_intentional_differences test_clean_interactive_libra_native
    last_verified: "2026-06-12"
    status_source: manual-bootstrap
    expected_failure_handling: not-applicable
    host_dependencies: none
    data_flow: Worktree enumeration + user selection loop
    control_flow: Interactive loop (pattern-based filtering, numbered selection, help) -> deletion
    risk_controls: Fail-closed on selection errors; no external command execution
    compliance_note: Libra has native implementation; intentionally not Git-compatible
    notes: |
      Git's `clean -i` is an interactive prompt in the Git CLI itself.
      Libra implements a native interactive selection loop with pattern/number-based filtering
      and help menu. Mutually exclusive with -n (no-op mode) and --json (structured output).
      User can choose to delete/filter by pattern/select by number/ask each/quit/help.
      See COMPATIBILITY.md clean row for full details.

