    test_evidence: tests/compat/clean_intentional_diff.rs::clean_interactive_not_marked_supported + clean_interactive_rejects_dry_run + clean_interactive_rejects_json
    verification_command: cargo test --test compat_clean_intentional_diff
    last_verified: "2026-06-12"
    status_source: generated
    expected_failure_handling: not-applicable
    host_dependencies: none
    data_flow: CLI parsing + interactive worktree enumeration + user selection
    control_flow: clap parser -> interactive mode handler -> menu loop -> action dispatch
    risk_controls: Interactive I/O bounded by error handling; mutual exclusivity enforced at parser level
    compliance_note: Libra has intentional native implementation; not Git-compatible by design
    notes: |
      Git's `clean -i` is an interactive regex-filter prompt in the Git CLI.
      Libra implements a native interactive selection loop with menu-based
      filtering and numbered/pattern-based selection (clean/filter/select/ask/quit/help).

      Mutually exclusive with -n (dry-run) and --json (structured output) per LBR-CLI-002.
      This is an intentional design difference; recommended alternative for Git
      filter semantics: use explicit pathspec with `clean <pattern>`.

      See COMPATIBILITY.md clean row for full details.

