# Libra Compatibility Matrix
#
# This YAML is the source of truth for parameter-level Git compatibility tracking.
# It is generated from src/cli.rs, COMPATIBILITY.md, command docs, integration-scenarios.yaml,
# and upstream Git documentation.
#
# Machine-readable state (test_evidence, last_verified, verification_command, status_source)
# must be generated by automated tools; human editors are restricted to:
#   - action, priority, phase, declined_ref
#   - notes, performance_note, compliance_note, risk_controls
#   - decision_deadline, decision_owner (for evaluate rows)
#
# All other fields are reserved for tool generation.
#
# See docs/development/compatibility.md §PRE-2 for schema definition.

schema_version: "1.0"
matrix_created: "2026-06-12"
generated_from:
  - src/cli.rs
  - COMPATIBILITY.md
  - docs/commands/
  - docs/development/integration-scenarios.yaml
  - tools/integration-runner/src/registry.rs
  - upstream Git documentation (git-scm.com/docs, git.git t/ tests)
  - docs/improvement/compatibility/declined.md
  - optional: Grit supplemental reference (unavailable in Phase 0, will be added if available)

manual_fields:
  - action
  - priority
  - phase
  - declined_ref
  - notes
  - performance_note
  - compliance_note
  - risk_controls
  - decision_deadline
  - decision_owner

tool_generated_fields:
  - status
  - test_evidence
  - verification_command
  - last_verified
  - status_source
  - expected_failure_handling
  - owner_scenario
  - tests
  - git_tests
  - grit_tests
  - compat_contract
  - source_of_truth
  - interop_surface
  - host_dependencies
  - data_flow
  - control_flow
  - risk

